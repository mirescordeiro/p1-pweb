<button (click)="aoClicar()">
  <img
    [src]="produto.imagem.url"
    [alt]="produto.imagem.descricao"
    width="100%"
  />

  <div class="flex items-center">
    <h3 class="text-xl text-left py-3 flex-1">{{ produto.nome }}</h3>
    <p class="text-sm text-secondary uppercase font-bold py-3 flex-none">
      {{ produto.preco | currency : "BRL" : "symbol-narrow" }}
    </p>
  </div>
</button>
